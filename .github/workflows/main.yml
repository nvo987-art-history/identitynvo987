#!/bin/bash
set -e

echo "=== FULL REPO VALIDATION ==="

########################################
# Empty files
########################################
echo "Checking empty files..."
EMPTY=$(find . -type f -empty ! -path "*/.git/*" || true)
if [ -n "$EMPTY" ]; then
  echo "ERROR: Empty files found:"
  echo "$EMPTY"
  exit 1
fi

########################################
# Invalid filenames (ONLY spaces!)
########################################
echo "Checking invalid filenames..."
BAD=$(find . -type f | grep " " || true)
if [ -n "$BAD" ]; then
  echo "ERROR: Filenames with spaces:"
  echo "$BAD"
  exit 1
fi

########################################
# JSON validation
########################################
echo "Validating JSON..."
find . -type f -name "*.json" ! -path "*/.git/*" | while read file; do
  jq empty "$file" || { echo "ERROR in $file"; exit 1; }
done

########################################
# HTML validation (lenient)
########################################
echo "Validating HTML..."
find . -type f -name "*.html" ! -path "*/.git/*" | while read file; do
  tidy -q -e "$file" || true   # csak warning
done

########################################
# Required meta (safe)
########################################
echo "Checking meta tags..."
find . -name "*.html" | while read file; do
  grep -qi "<title>" "$file" || echo "WARNING: missing title in $file"
  grep -qi "viewport" "$file" || echo "WARNING: missing viewport in $file"
done

########################################
# Internal links
########################################
echo "Checking internal links..."
grep -rhoP 'href="\K[^"]+' . | while read link; do
  [[ "$link" == http* ]] && continue
  [[ "$link" == \#* ]] && continue

  if [ ! -f ".$link" ] && [ ! -d ".$link" ]; then
    echo "ERROR: Broken link: $link"
    exit 1
  fi
done

########################################
# Duplicate content (FIXED)
########################################
echo "Checking duplicate content..."
find . -type f ! -path "*/.git/*" -exec sha256sum {} + \
| sort \
| awk '{
  hash=$1
  file=$2
  files[hash]=files[hash]" "file
  count[hash]++
}
END {
  for (h in count) {
    if (count[h] > 1) {
      print "ERROR duplicate:" files[h]
      exit 1
    }
  }
}'

########################################
# Images
########################################
echo "Checking images..."
find . -type f \( -name "*.png" -o -name "*.jpg" \) | while read img; do
  file "$img" | grep -q "image" || {
    echo "ERROR: Invalid image: $img"
    exit 1
  }
done

########################################
# XML
########################################
echo "Validating XML..."
find . -type f -name "*.xml" | while read file; do
  xmllint --noout "$file" || {
    echo "ERROR: XML invalid: $file"
    exit 1
  }
done

echo "=== SUCCESS ==="
