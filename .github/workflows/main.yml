name: ENTERPRISE Web Validation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout FULL repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # CACHE
      # -------------------------
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}

      # -------------------------
      # INSTALL TOOLS
      # -------------------------
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq tidy curl bc

      - name: Install Node tools
        run: |
          npm install -g htmlhint lighthouse

      # -------------------------
      # CRITICAL FILES
      # -------------------------
      - name: Ensure critical files exist
        run: |
          test -f index.html || (echo "Missing index.html" && exit 1)
          test -f 404.html || (echo "Missing 404.html" && exit 1)

      # -------------------------
      # JSON VALIDATION
      # -------------------------
      - name: Validate JSON
        run: |
          set -e
          find . -type f \( -name "*.json" -o -name "*.jsonld" \) ! -path "*/.git/*" \
          -exec sh -c 'echo "JSON: $1"; jq . "$1" > /dev/null' _ {} \;

      # -------------------------
      # HTML VALIDATION
      # -------------------------
      - name: Validate HTML (tidy strict)
        run: |
          set -e
          find . -type f -name "*.html" ! -path "*/.git/*" \
          -exec sh -c 'echo "Tidy: $1"; tidy -q -e "$1"' _ {} \;

      - name: Validate HTML (htmlhint)
        run: htmlhint "**/*.html"

      # -------------------------
      # EMPTY FILE CHECK
      # -------------------------
      - name: No empty files
        run: |
          set -e
          if find . -type f ! -path "*/.git/*" -empty | grep .; then
            echo "Empty files found"
            exit 1
          fi

      # -------------------------
      # DUPLICATE FILE CHECK
      # -------------------------
      - name: Detect duplicate files
        run: |
          set -e
          DUP=$(find . -type f ! -path "*/.git/*" -exec sha256sum {} + | sort | uniq -d || true)
          if [ -n "$DUP" ]; then
            echo "Duplicate files detected"
            echo "$DUP"
            exit 1
          fi

      # -------------------------
      # INTERNAL LINK CHECK (SMART)
      # -------------------------
      - name: Internal link integrity (smart)
        run: |
          set -e

          DOMAIN="https://identity.nvo987.us"

          grep -rhoP 'href="\K[^"]+' . | while read -r link; do

            # skip anchors
            [[ "$link" == \#* ]] && continue

            # absolute external
            if [[ "$link" == http* ]]; then
              continue
            fi

            # local file exists
            if [ -f ".$link" ]; then
              continue
            fi

            # try HTTP check for endpoints
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$DOMAIN$link")

            if [[ "$STATUS" != "200" ]]; then
              echo "Broken link: $link (HTTP $STATUS)"
              exit 1
            else
              echo "OK (endpoint): $link"
            fi

          done

      # -------------------------
      # EXTERNAL LINKS (STRICT)
      # -------------------------
      - name: External link check
        run: |
          set -e
          grep -rhoP 'href="https?://[^"]+' . | cut -d '"' -f2 | sort -u | head -n 30 \
          | while read -r url; do
              STATUS=$(curl -Is --max-time 5 "$url" | head -n 1 | grep -o "[0-9][0-9][0-9]" || true)
              echo "$url -> $STATUS"
              if [[ "$STATUS" != "200" && "$STATUS" != "301" && "$STATUS" != "302" ]]; then
                echo "Broken external: $url"
                exit 1
              fi
            done

      # -------------------------
      # SECURITY CHECKS
      # -------------------------
      - name: Security checks (strict)
        run: |
          set -e

          # inline JS
          if grep -r "<script>" . | grep -v defer; then
            echo "Blocking JS detected"
            exit 1
          fi

          # target blank without rel
          if grep -r 'target="_blank"' . | grep -v 'rel='; then
            echo "Missing rel=noopener"
            exit 1
          fi

      # -------------------------
      # SEO CHECKS (STRICT)
      # -------------------------
      - name: SEO checks
        run: |
          set -e
          find . -name "*.html" ! -path "*/.git/*" \
          -exec sh -c '
            file="$1"

            grep -qi "<title>" "$file" || exit 1
            grep -qi "meta name=\"description\"" "$file" || exit 1
            grep -qi "meta name=\"viewport\"" "$file" || exit 1
            grep -qi "rel=\"canonical\"" "$file" || exit 1

          ' _ {} \;

      # -------------------------
      # IMAGE CHECK (STRICT)
      # -------------------------
      - name: Image best practices
        run: |
          set -e
          if grep -r "<img" . | grep -v "loading="; then
            echo "Images must use lazy loading"
            exit 1
          fi

      # -------------------------
      # LIGHTHOUSE
      # -------------------------
      - name: Run Lighthouse
        run: |
          npx lighthouse https://identity.nvo987.us \
            --only-categories=performance,seo \
            --quiet \
            --chrome-flags="--headless" \
            --output=json \
            --output-path=./lighthouse-report.json

      # -------------------------
      # STRICT SCORE
      # -------------------------
      - name: Enforce Lighthouse score
        run: |
          SCORE=$(jq '.categories.performance.score * 100 | floor' lighthouse-report.json)
          echo "Performance score: $SCORE"

          LIMIT=60

          if [ "$SCORE" -lt "$LIMIT" ]; then
            echo "Performance too low"
            exit 1
          fi

      # -------------------------
      # FINAL
      # -------------------------
      - name: Done
        run: echo "ENTERPRISE VALIDATION PASSED"
