name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run validator (no install)
        run: |
          echo "=== VALIDATION START ==="

          ########################################
          # Empty files
          ########################################
          EMPTY=$(find . -type f -empty ! -path "*/.git/*" || true)
          if [ -n "$EMPTY" ]; then
            echo "ERROR: Empty files:"
            echo "$EMPTY"
            exit 1
          fi

          ########################################
          # Filenames (only spaces forbidden)
          ########################################
          BAD=$(find . -type f | grep " " || true)
          if [ -n "$BAD" ]; then
            echo "ERROR: Filename contains space:"
            echo "$BAD"
            exit 1
          fi

          ########################################
          # JSON basic validation (no jq)
          ########################################
          echo "Checking JSON structure..."
          find . -name "*.json" ! -path "*/.git/*" | while read file; do
            # very basic check: must start with { or [
            head -n 1 "$file" | grep -qE '^\s*[\{\[]' || {
              echo "ERROR: Invalid JSON start in $file"
              exit 1
            }
          done

          ########################################
          # HTML basic validation (no tidy)
          ########################################
          echo "Checking HTML..."
          find . -name "*.html" | while read file; do
            grep -qi "<html" "$file" || echo "WARN: no <html> in $file"
            grep -qi "<head" "$file" || echo "WARN: no <head> in $file"
            grep -qi "<body" "$file" || echo "WARN: no <body> in $file"
          done

          ########################################
          # META tags (no fail, only warn)
          ########################################
          echo "Checking META..."
          find . -name "*.html" | while read file; do
            grep -qi "<title>" "$file" || echo "WARN: missing title in $file"
            grep -qi "viewport" "$file" || echo "WARN: missing viewport in $file"
            grep -qi "description" "$file" || echo "WARN: missing description in $file"
          done

          ########################################
          # Internal links
          ########################################
          echo "Checking internal links..."
          grep -rhoP 'href="\K[^"]+' . | while read link; do
            [[ "$link" == http* ]] && continue
            [[ "$link" == \#* ]] && continue
            [[ "$link" == mailto:* ]] && continue

            if [ ! -f ".$link" ] && [ ! -d ".$link" ]; then
              echo "ERROR: Broken link: $link"
              exit 1
            fi
          done

          ########################################
          # Relative paths (assets)
          ########################################
          echo "Checking src paths..."
          grep -rhoP 'src="\K[^"]+' . | while read link; do
            [[ "$link" == http* ]] && continue

            if [ ! -f ".$link" ]; then
              echo "ERROR: Missing asset: $link"
              exit 1
            fi
          done

          ########################################
          # Duplicate content (safe)
          ########################################
          echo "Checking duplicate content..."
          find . -type f ! -path "*/.git/*" -exec sha256sum {} + \
          | sort \
          | awk '{
            h=$1
            c[h]++
          }
          END {
            for (x in c) {
              if (c[x] > 5) {
                print "WARN: many identical files (icons etc)"
              }
            }
          }'

          ########################################
          # Images
          ########################################
          echo "Checking images..."
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.svg" \) | while read img; do
            file "$img" | grep -qi "image" || {
              echo "ERROR: Invalid image: $img"
              exit 1
            }
          done

          ########################################
          # .well-known basic check
          ########################################
          if [ -d ".well-known" ]; then
            echo "Checking .well-known..."
            find .well-known -type f | while read f; do
              [ -s "$f" ] || {
                echo "ERROR: Empty well-known file: $f"
                exit 1
              }
            done
          fi

          ########################################
          # XML basic check (no xmllint)
          ########################################
          echo "Checking XML..."
          find . -name "*.xml" | while read file; do
            grep -q "<" "$file" || {
              echo "ERROR: Invalid XML: $file"
              exit 1
            }
          done

          echo "=== SUCCESS ==="
