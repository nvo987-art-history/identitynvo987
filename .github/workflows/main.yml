name: Identity Full Root Validator (No Install)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # FULL CHECKOUT
      # -------------------------
      - name: Checkout FULL repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # VALIDATE ALL JSON / JSONLD
      # -------------------------
      - name: Validate ALL JSON / JSONLD
        run: |
          set -e

          find "$GITHUB_WORKSPACE" -type f \
            \( -name "*.json" -o -name "*.jsonld" \) \
            ! -path "*/.git/*" \
            ! -path "*/node_modules/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            -print0 \
          | while IFS= read -r -d '' file; do
              echo "Checking JSON: $file"

              # Skip binary files
              if ! grep -Iq . "$file"; then
                echo "Skipping binary file: $file"
                continue
              fi

              python3 -m json.tool "$file" > /dev/null
            done

          echo "JSON validation complete."

      # -------------------------
      # VALIDATE ALL HTML
      # -------------------------
      - name: Validate ALL HTML
        run: |
          set -e

          find "$GITHUB_WORKSPACE" -type f \
            -name "*.html" \
            ! -path "*/.git/*" \
            ! -path "*/node_modules/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            -print0 \
          | while IFS= read -r -d '' file; do
              echo "Checking HTML: $file"

              # Skip binary files
              if ! grep -Iq . "$file"; then
                echo "Skipping binary file: $file"
                continue
              fi

              grep -qi "<!doctype html" "$file" || {
                echo "Missing DOCTYPE in $file"
                exit 1
              }

              grep -qi "</html>" "$file" || {
                echo "Missing </html> in $file"
                exit 1
              }
            done

          echo "HTML validation complete."

      # -------------------------
      # CHECK EMPTY FILES
      # -------------------------
      - name: Fail if any empty file exists
        run: |
          set -e

          find "$GITHUB_WORKSPACE" -type f \
            ! -path "*/.git/*" \
            ! -path "*/node_modules/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            -print0 \
          | while IFS= read -r -d '' file; do

              case "$file" in
                *.gitkeep|*.keep) continue ;;
              esac

              if [ ! -s "$file" ]; then
                echo "Empty file detected: $file"
                exit 1
              fi
            done

          echo "No empty files detected."

      - name: Final status
        run: echo "FULL ROOT VALIDATION PASSED"
