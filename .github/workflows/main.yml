#!/usr/bin/env bash
set -Eeuo pipefail

echo "🚀 FULL REPO VALIDATOR (STRICT MODE)"

ERRORS=0
TMP_ERRORS=$(mktemp)

fail() {
  echo "❌ $1"
  echo 1 > "$TMP_ERRORS"
}

ok() {
  echo "✅ $1"
}

########################################
# 0. INIT
########################################
echo 0 > "$TMP_ERRORS"

########################################
# 1. FILE STRUCTURE
########################################
echo "📁 Checking files..."

while IFS= read -r file; do
  if [ ! -s "$file" ]; then
    fail "Empty file: $file"
  fi
done < <(find . -type f)

########################################
# 2. JSON VALIDATION
########################################
echo "🧠 JSON validation..."

while IFS= read -r file; do
  if ! jq empty "$file" >/dev/null 2>&1; then
    fail "Invalid JSON: $file"
  else
    ok "JSON OK: $file"
  fi
done < <(find . \( -name "*.json" -o -name "*.jsonld" \))

########################################
# 3. HTML STRUCTURE
########################################
echo "🌐 HTML validation..."

while IFS= read -r file; do

  grep -q "<html" "$file" || fail "Missing <html>: $file"
  grep -q "</html>" "$file" || fail "Missing </html>: $file"
  grep -q "<head" "$file" || fail "Missing <head>: $file"
  grep -q "<body" "$file" || fail "Missing <body>: $file"

done < <(find . -name "*.html")

########################################
# 4. LINK VALIDATION (SMART)
########################################
echo "🔗 Checking links..."

while IFS= read -r file; do

  BASE=$(grep -oP '<link rel="canonical" href="\K[^"]+' "$file" | head -n1 || true)
  BASE=${BASE%/}

  grep -rhoP 'href="\K[^"]+' "$file" | sort -u | while read -r link; do

    [[ "$link" == \#* ]] && continue
    [[ "$link" =~ ^(mailto:|tel:|javascript:) ]] && continue

    URL=""

    if [[ "$link" =~ ^https?:// ]]; then
      URL="$link"

    elif [[ "$link" =~ ^// ]]; then
      URL="https:$link"

    elif [[ "$link" =~ ^/ ]]; then
      URL="$BASE$link"

    else
      LOCAL="$(dirname "$file")/$link"
      if [ -f "$LOCAL" ]; then
        ok "Local OK: $LOCAL"
        continue
      fi
      URL="$BASE/$link"
    fi

    # skip empty base
    if [ -z "$URL" ]; then
      continue
    fi

    STATUS=$(curl -o /dev/null -s -L --max-time 10 -w "%{http_code}" "$URL" || echo "000")

    if [[ "$STATUS" =~ ^2|3 ]]; then
      ok "$URL ($STATUS)"
    else
      fail "$URL ($STATUS)"
    fi

  done

done < <(find . -name "*.html")

########################################
# 5. ASSETS (src)
########################################
echo "🖼 Checking assets..."

grep -rhoP 'src="\K[^"]+' . | sort -u | while read -r src; do

  [[ "$src" =~ ^data: ]] && continue

  if [[ "$src" =~ ^https?:// ]]; then
    STATUS=$(curl -o /dev/null -s -L --max-time 10 -w "%{http_code}" "$src" || echo "000")
    [[ "$STATUS" =~ ^2|3 ]] || fail "Asset fail: $src ($STATUS)"
  else
    [ -f ".$src" ] || fail "Missing asset: $src"
  fi

done

########################################
# 6. .WELL-KNOWN (AUTO DISCOVERY)
########################################
echo "🧬 .well-known validation..."

grep -rhoP '\.well-known[^"]*' . | sort -u | while read -r path; do

  if [[ "$path" =~ ^https?:// ]]; then
    URL="$path"
  else
    BASE=$(grep -oP 'https?://[^"]+' . | head -n1)
    URL="${BASE%/}/$path"
  fi

  STATUS=$(curl -o /dev/null -s -L --max-time 10 -w "%{http_code}" "$URL" || echo "000")

  if [[ "$STATUS" =~ ^2|3 ]]; then
    ok "$URL ($STATUS)"
  else
    fail "$URL ($STATUS)"
  fi

done

########################################
# 7. DUPLICATES
########################################
echo "🔁 Duplicate links..."

DUPES=$(grep -rhoP 'href="\K[^"]+' . | sort | uniq -d)

if [ -n "$DUPES" ]; then
  echo "⚠️ Duplicate links:"
  echo "$DUPES"
fi

########################################
# 8. FINAL
########################################

if [ "$(cat $TMP_ERRORS)" -eq 0 ]; then
  echo "🎉 REPO CLEAN"
  exit 0
else
  echo "💥 ERRORS FOUND"
  exit 1
fi
