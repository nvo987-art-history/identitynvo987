name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # INSTALL
      # -----------------------------
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tidy jq libxml2-utils
          npm install -g htmlhint

      # -----------------------------
      # EMPTY FILES
      # -----------------------------
      - name: Detect empty files
        run: |
          EMPTY=$(find . -type f -empty ! -path "*/.git/*")
          if [ -n "$EMPTY" ]; then
            echo "❌ Empty files found:"
            echo "$EMPTY"
            exit 1
          fi

      # -----------------------------
      # SAFE FILENAME CHECK
      # -----------------------------
      - name: Check invalid filenames
        run: |
          BAD=$(find . -type f ! -path "*/.git/*" | grep -E '[<>:"\\|?*]' || true)
          if [ -n "$BAD" ]; then
            echo "❌ Invalid filenames:"
            echo "$BAD"
            exit 1
          fi

      # -----------------------------
      # JSON VALIDATION
      # -----------------------------
      - name: Validate JSON & JSON-LD
        run: |
          find . -type f \( -name "*.json" -o -name "*.jsonld" \) ! -path "*/.git/*" | while read file; do
            echo "Checking JSON: $file"
            jq empty "$file" || exit 1
          done

      # -----------------------------
      # HTML (TIDY - NON BLOCKING)
      # -----------------------------
      - name: Validate HTML with tidy
        run: |
          find . -type f -name "*.html" ! -path "*/.git/*" | while read file; do
            echo "Tidy check: $file"
            tidy -q "$file" || true
          done

      # -----------------------------
      # HTMLHINT (NON BLOCKING)
      # -----------------------------
      - name: Validate HTML with htmlhint
        run: |
          htmlhint "**/*.html" || true

      # -----------------------------
      # META TAGS (ONLY INDEX)
      # -----------------------------
      - name: Enforce required meta tags
        run: |
          ERROR=0

          find . -name "index.html" ! -path "*/.git/*" | while read file; do
            echo "Meta check: $file"

            grep -qi "<title>" "$file" || { echo "❌ Missing <title> in $file"; ERROR=1; }
            grep -qi 'name="viewport"' "$file" || { echo "❌ Missing viewport in $file"; ERROR=1; }
            grep -qi 'name="description"' "$file" || { echo "❌ Missing description in $file"; ERROR=1; }

          done

          exit $ERROR

      # -----------------------------
      # INTERNAL LINKS
      # -----------------------------
      - name: Validate internal links
        run: |
          ERROR=0

          grep -rhoP 'href="\K[^"]+' . | while read link; do

            [[ "$link" == http* ]] && continue
            [[ "$link" == \#* ]] && continue
            [[ "$link" == mailto:* ]] && continue

            FILE=".$link"

            if [ ! -e "$FILE" ]; then
              echo "❌ Broken link: $link"
              ERROR=1
            fi

          done

          exit $ERROR

      # -----------------------------
      # RELATIVE PATHS (WARNING ONLY)
      # -----------------------------
      - name: Validate relative paths
        run: |
          grep -rhoP '(src|href)="\K[^"]+' . | while read path; do
            if [[ "$path" != http* ]] && [[ "$path" != /* ]] && [[ ! -f "$path" ]]; then
              echo "⚠️ Possibly invalid path: $path"
            fi
          done

      # -----------------------------
      # DUPLICATE FILES
      # -----------------------------
      - name: Detect duplicate files
        run: |
          DUP=$(find . -type f ! -path "*/.git/*" -exec sha256sum {} + | sort | uniq -d -w64)
          if [ -n "$DUP" ]; then
            echo "❌ Duplicate files found:"
            echo "$DUP"
            exit 1
          fi

      # -----------------------------
      # SECURITY CHECK
      # -----------------------------
      - name: Security validation
        run: |
          grep -r "<script>" . --exclude-dir=.git && echo "⚠️ Inline script found"

      # -----------------------------
      # IMAGE ALT CHECK
      # -----------------------------
      - name: Image checks
        run: |
          grep -r "<img" . --exclude-dir=.git | grep -v "alt=" && echo "⚠️ Missing alt attributes"

      # -----------------------------
      # .WELL-KNOWN
      # -----------------------------
      - name: Validate .well-known structure
        run: |
          if [ -d ".well-known" ]; then
            echo "✔ .well-known exists"
          else
            echo "⚠️ Missing .well-known directory"
          fi

      # -----------------------------
      # XML VALIDATION
      # -----------------------------
      - name: Validate XML files
        run: |
          find . -name "*.xml" ! -path "*/.git/*" | while read file; do
            xmllint --noout "$file" || exit 1
          done

      # -----------------------------
      # DONE
      # -----------------------------
      - name: SUCCESS
        run: echo "✅ All critical checks passed"
