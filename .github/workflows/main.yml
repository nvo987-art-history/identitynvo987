name: ENTERPRISE Web Validation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout FULL repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # CACHE (GYORSÍTÁS)
      # -------------------------
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}

      # -------------------------
      # INSTALL TOOLS
      # -------------------------
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq tidy curl

      - name: Install Node tools
        run: |
          npm install -g htmlhint lighthouse broken-link-checker

      # -------------------------
      # CRITICAL FILES
      # -------------------------
      - name: Ensure 404.html exists
        run: |
          test -f 404.html || (echo "Missing 404.html" && exit 1)

      # -------------------------
      # JSON VALIDATION
      # -------------------------
      - name: Validate JSON
        run: |
          set -e
          find . -type f \( -name "*.json" -o -name "*.jsonld" \) ! -path "*/.git/*" \
          -exec sh -c 'echo "JSON: $1"; jq . "$1" > /dev/null' _ {} \;

      # -------------------------
      # HTML VALIDATION (DUAL LAYER)
      # -------------------------
      - name: Validate HTML (tidy)
        run: |
          set -e
          find . -type f -name "*.html" ! -path "*/.git/*" \
          -exec sh -c 'echo "Tidy: $1"; tidy -q -e "$1"' _ {} \;

      - name: Validate HTML (htmlhint)
        run: |
          htmlhint "**/*.html"

      # -------------------------
      # EMPTY FILE CHECK
      # -------------------------
      - name: No empty files
        run: |
          set -e
          if find . -type f ! -path "*/.git/*" -empty | grep .; then
            echo "Empty files found"
            exit 1
          fi

      # -------------------------
      # INTERNAL LINK CHECK
      # -------------------------
      - name: Internal link integrity
        run: |
          set -e
          grep -rhoP 'href="\K[^"]+' . | while read -r link; do
            if [[ "$link" == /*.html ]]; then
              [ -f ".$link" ] || (echo "Broken link: $link" && exit 1)
            fi
          done

      # -------------------------
      # EXTERNAL LINK CHECK (CONTROLLED)
      # -------------------------
      - name: External link check
        run: |
          grep -rhoP 'href="https?://[^"]+' . | cut -d '"' -f2 | sort -u | head -n 25 \
          | while read -r url; do
              echo "Checking $url"
              curl -Is --max-time 5 "$url" | head -n 1 || echo "Warning: $url"
            done

      # -------------------------
      # BASIC SEO VALIDATION
      # -------------------------
      - name: SEO checks
        run: |
          set -e
          find . -name "*.html" ! -path "*/.git/*" \
          -exec sh -c '
            file="$1"
            grep -qi "<title>" "$file" || (echo "Missing title: $file" && exit 1)
            grep -qi "meta name=\"viewport\"" "$file" || (echo "Missing viewport: $file" && exit 1)
          ' _ {} \;

      # -------------------------
      # LIGHTHOUSE (PERFORMANCE + SEO)
      # -------------------------
      - name: Run Lighthouse
        run: |
          npx lighthouse https://www.nvo987.fr \
            --only-categories=performance,seo \
            --quiet \
            --chrome-flags="--headless" \
            --output=json \
            --output-path=./lighthouse-report.json

      # -------------------------
      # OPTIONAL: FAIL IF SCORE LOW
      # -------------------------
      - name: Enforce Lighthouse score
        run: |
          SCORE=$(jq '.categories.performance.score * 100' lighthouse-report.json)
          echo "Performance score: $SCORE"
          if (( $(echo "$SCORE < 70" | bc -l) )); then
            echo "Performance too low!"
            exit 1
          fi

      # -------------------------
      # FINAL
      # -------------------------
      - name: Done
        run: echo "ENTERPRISE VALIDATION PASSED"
